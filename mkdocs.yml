site_name: 十元建立的世界觀
theme:
  name: material
  language: zh-Hant  # 設定為繁體中文（搜尋介面也會變中文）
  palette: 
    # 日夜模式切換按鈕
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切換至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切換至淺色模式
  features:
    - content.tabs.link
    - navigation.tags  # 在側邊欄顯示標籤（可選）
    - navigation.tabs      # 頂部導航欄（適合大分類）
    - navigation.tracking  # 右側目錄會自動高亮當前位置
    - navigation.sections  # 側邊欄分組標題
    - navigation.path  # 在頁面頂部顯示當前路徑（例如：首頁 > 市鎮 > 藻林村）
    - navigation.top   # 當頁面滑到底部時，右下角出現「回到頂部」的按鈕。
    - search.suggest       # 搜尋自動補完
    - content.code.copy    # 程式碼右上角出現複製按鈕
    - toc.integrate # 將右側的小目錄整合進左側大導覽

plugins:
  - search
  - tags:
      tags_file: tags.md  # 指定 tags 的檔案路徑
  - roamlinks  # 啟用後就能用 [[頁面]] 語法了
markdown_extensions:
  - admonition          # 提醒區塊
  - pymdownx.details    # 折疊區塊
  - pymdownx.arithmatex: # LaTeX
      generic: true  
  - pymdownx.tabbed:    # 標籤頁
      alternate_style: true 
  - footnotes           # 腳註
  - tables              # 表格
  - attr_list           # 允許為元素加入 CSS 類別
  - pymdownx.mark       # 螢光筆文字
  - pymdownx.tilde      # 刪除線
  - pymdownx.superfences: # 支持嵌套語法（如標籤頁裡放代碼）
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format # 使用標準格式而非 mermaid_format
nav:
  - 首頁: index.md
  - 定居地:
    - I.小村莊:
      - 001.藻林村: settlement/hamlet/001.藻林村.md
    - II.村莊:
      - 001.劍貝港: settlement/village/001.劍貝港.md
    - III.小鎮:
      - 001.紅流: settlement/town/001.紅流.md
    - IV.城市:
      - 001.陣列岩: settlement/city/001.陣列岩.md
    - V.首都:
      - 001.長灣: settlement/capital/001.長灣.md
  - 地下城:
    - I.小型(Small): 
      - 001.藻林村外的海蝕洞: dungeon/small/001.藻林村外的海蝕洞.md
    - II.中型(Medium):
      - 003.陣列岩的地下迷宮: dungeon/medium/003.陣列岩的地下迷宮.md
    - III.大型(Large):
      - 施工中: 404.md
  - 家族:
      - 001.摩根: family/001.摩根.md
      - 002.瑪格瑪: family/002.瑪格瑪.md
      - 003.諾摩斯: family/003.諾摩斯.md
      - 004.埃拉托: family/004.埃拉托.md
  - 組織:
    - I.區域性:
      - 001.天體觀測協會: organize/local/001.天體觀測協會.md
extra_javascript:
  - javascripts/mermaid.js  # 放在本地的初始化腳本
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/extra.css